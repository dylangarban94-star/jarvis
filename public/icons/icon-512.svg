<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#000000" rx="80"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="192" fill="none" stroke="#b8860b" stroke-width="2" opacity="0.5"/>

  <!-- Neural connection lines -->
  <line x1="256" y1="64"  x2="256" y2="448" stroke="#b8860b" stroke-width="1" opacity="0.25"/>
  <line x1="64"  y1="256" x2="448" y2="256" stroke="#b8860b" stroke-width="1" opacity="0.25"/>
  <line x1="110" y1="110" x2="402" y2="402" stroke="#b8860b" stroke-width="1" opacity="0.18"/>
  <line x1="402" y1="110" x2="110" y2="402" stroke="#b8860b" stroke-width="1" opacity="0.18"/>

  <!-- Node dots on ring -->
  <circle cx="256" cy="64"  r="5" fill="#ffb300" opacity="0.8"/>
  <circle cx="448" cy="256" r="5" fill="#ffb300" opacity="0.8"/>
  <circle cx="256" cy="448" r="5" fill="#ffb300" opacity="0.8"/>
  <circle cx="64"  cy="256" r="5" fill="#ffb300" opacity="0.8"/>
  <circle cx="110" cy="110" r="4" fill="#b8860b" opacity="0.7"/>
  <circle cx="402" cy="110" r="4" fill="#b8860b" opacity="0.7"/>
  <circle cx="402" cy="402" r="4" fill="#b8860b" opacity="0.7"/>
  <circle cx="110" cy="402" r="4" fill="#b8860b" opacity="0.7"/>

  <!-- Middle ring -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="#ffb300" stroke-width="1.5" opacity="0.35"/>

  <!-- Outer glow -->
  <circle cx="256" cy="256" r="80" fill="#b8860b" opacity="0.06"/>

  <!-- Core glow -->
  <circle cx="256" cy="256" r="48" fill="#ffb300" opacity="0.14"/>
  <circle cx="256" cy="256" r="26" fill="#ffd700" opacity="0.35"/>
  <circle cx="256" cy="256" r="10" fill="#fff3b0" opacity="0.9"/>
</svg>
